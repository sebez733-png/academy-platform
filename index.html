.btn-outline:hover{background:var(--primary);color:#fff}
.btn-sm{padding:8px 18px;font-size:.875rem}

.sidebar-link:hover,.sidebar-link.active{background:rgba(212,168,67,.15);color:var(--gold)}

.toast-error{background:#DC2626}
.toast-info{background:var(--primary)}
.progress-ring{transform:rotate(-90deg)}

function getDB(){
  if(!localStorage.getItem('ads_db')){localStorage.setItem('ads_db',JSON.stringify(DEFAULT_DB))}
  return JSON.parse(localStorage.getItem('ads_db'));
}
function saveDB(db){localStorage.setItem('ads_db',JSON.stringify(db))}
function resetDB(){localStorage.removeItem('ads_db');location.reload()}

// ==================== AUTH ====================
let currentUser=null;
let currentPage='home';
let pageParams={};

function initAuth(){
  const saved=localStorage.getItem('ads_current_user');
  if(saved)currentUser=JSON.parse(saved);
}
function login(username,password){
  const db=getDB();
  const user=db.users.find(u=>u.username===username&&u.password_hash===password);
  if(user){if(!user.status){return{success:false,message:'Account is suspended'}}currentUser=user;localStorage.setItem('ads_current_user',JSON.stringify(user));return{success:true,message:'Login successful',role:user.role}}
  return{success:false,message:'Invalid username or password'};
}
function register(data){
  const db=getDB();
  if(db.users.find(u=>u.username===data.username))return{success:false,message:'Username already taken'};
  if(db.users.find(u=>u.phone===data.phone))return{success:false,message:'Phone number already registered'};
  const newId=Math.max(...db.users.map(u=>u.id))+1;
  const user={id:newId,username:data.username,full_name:data.full_name,email:data.email||'',phone:data.phone,password_hash:data.password,profile_image:data.profile_image||'https://picsum.photos/seed/default-avatar/200/200',role:'student',status:true,created_at:new Date().toISOString().split('T')[0]};
  db.users.push(user);
  const sid=Math.max(...db.student_profiles.map(s=>s.id),0)+1;
  const snum=db.student_profiles.length+1;
  db.student_profiles.push({id:sid,user_id:newId,student_id:'ADS-2025-'+String(snum).padStart(4,'0'),education_level:data.education_level||'',location:data.location||'',registration_date:user.created_at});
  db.notifications.push({id:db.notifications.length+1,user_id:newId,title:'Welcome to ADS Academy!',message:'Your account has been created successfully. Start exploring courses!',read_status:false,created_at:new Date().toISOString().split('T')[0]});
  saveDB(db);currentUser=user;localStorage.setItem('ads_current_user',JSON.stringify(user));
  return{success:true,message:'Registration successful'};
}
function logout(){currentUser=null;localStorage.removeItem('ads_current_user');navigate('home')}
function getUserProfile(userId){
  const db=getDB();
  const user=db.users.find(u=>u.id===userId);
  if(!user)return null;
  if(user.role==='student'){const sp=db.student_profiles.find(s=>s.user_id===userId);return{...user,...sp}}
  if(user.role==='instructor'){const ip=db.instructor_profiles.find(i=>i.user_id===userId);return{...user,...ip}}
  return user;
}

// ==================== TOAST ====================
function showToast(message,type='success'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  const icon=type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle';
  t.innerHTML=`<i class="fas ${icon}"></i><span>${message}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},3500);
}

// ==================== ROUTER ====================
function navigate(page,params={}){
  currentPage=page;pageParams=params;
  window.scrollTo({top:0,behavior:'smooth'});
  render();
}

function render(){
  const app=document.getElementById('app');
  const isAdmin=currentUser&&(currentUser.role==='admin'||currentUser.role==='superadmin');
  const isInstructor=currentUser&&currentUser.role==='instructor';
  const isStudent=currentUser&&currentUser.role==='student';

  if(isAdmin){app.innerHTML=renderAdminLayout();initAdminCharts();return}
  if(isInstructor){app.innerHTML=renderInstructorLayout();return}

  let header=renderPublicHeader();
  let content='';
  switch(currentPage){
    case'home':content=renderHome();break;
    case'about':content=renderAbout();break;
    case'courses':content=renderCourses();break;
    case'course-detail':content=renderCourseDetail();break;
    case'instructors':content=renderInstructors();break;
    case'certificate-verify':content=renderCertVerify();break;
    case'blog':content=renderBlog();break;
    case'contact':content=renderContact();break;
    case'login':content=renderLogin();break;
    case'register':content=renderRegister();break;
    case'student-dashboard':content=renderStudentDashboard();break;
    case'student-learning':content=renderStudentLearning();break;
    case'student-exam':content=renderStudentExam();break;
    case'student-certificates':content=renderStudentCertificates();break;
    case'student-profile':content=renderStudentProfile();break;
    default:content=renderHome();
  }
  let footer=renderPublicFooter();
  app.innerHTML=header+`<main class="page-transition">${content}</main>`+footer;
  initScrollAnimations();
}

function renderCourses(){

  return`

    <div class="flex flex-wrap items-center gap-4 mb-8">
      <input id="course-search" class="input-field max-w-sm" placeholder="Search courses..." oninput="filterCourses()">
      <div class="flex gap-2 flex-wrap">
        <button class="btn-sm bg-primary text-white rounded-lg" onclick="filterByCategory(0,this)">All</button>
        ${db.categories.map(c=>`<button class="btn-sm bg-gray-100 text-gray-600 rounded-lg hover:bg-primary hover:text-white transition" onclick="filterByCategory(${c.id},this)">${c.name}</button>`).join('')}
      </div>
    </div>
    <div id="courses-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      ${courses.map(c=>renderCourseCard(c)).join('')}
    </div>
  </section>`;

function filterCourses(){
  const q=document.getElementById('course-search').value.toLowerCase();
  const db=getDB();
  const filtered=db.courses.filter(c=>c.status==='published'&&c.title.toLowerCase().includes(q));
  document.getElementById('courses-grid').innerHTML=filtered.length?filtered.map(c=>renderCourseCard(c)).join(''):'<div class="col-span-full text-center py-12 text-gray-500">No courses found</div>';
}
function filterByCategory(catId,btn){
  const db=getDB();
  const courses=catId===0?db.courses.filter(c=>c.status==='published'):db.courses.filter(c=>c.status==='published'&&c.category_id===catId);
  document.getElementById('courses-grid').innerHTML=courses.map(c=>renderCourseCard(c)).join('');
  btn.parentElement.querySelectorAll('button').forEach(b=>{b.className='btn-sm bg-gray-100 text-gray-600 rounded-lg hover:bg-primary hover:text-white transition'});
  btn.className='btn-sm bg-primary text-white rounded-lg';
}

  const exam=db.exams.find(e=>e.course_id===courseId);

function switchLesson(lessonId,courseId){navigate('student-learning',{id:courseId,lesson:lessonId})}
function completeLesson(lessonId,courseId){
  const db=getDB();
  const existing=db.lesson_progress.find(p=>p.student_id===currentUser.id&&p.lesson_id===lessonId);
  if(!existing){db.lesson_progress.push({id:db.lesson_progress.length+1,student_id:currentUser.id,lesson_id:lessonId,completed:true})}
  else{existing.completed=true}
  const lessons=db.lessons.filter(l=>l.course_id===courseId);
  const allProgress=db.lesson_progress.filter(p=>p.student_id===currentUser.id&&lessons.some(l=>l.id===p.lesson_id));
  const completedCount=allProgress.filter(p=>p.completed).length;
  const pct=Math.round((completedCount/lessons.length)*100);
  const enrollment=db.enrollments.find(e=>e.student_id===currentUser.id&&e.course_id===courseId);
  if(enrollment){enrollment.progress_percentage=pct;if(pct===100)enrollment.status='completed'}
  saveDB(db);showToast('Lesson completed!');navigate('student-learning',{id:courseId});
}

let examState={answers:{},submitted:false,timer:null,timeLeft:0};
function renderStudentExam(){
  if(!currentUser){navigate('login');return ''}
  const db=getDB();
  const courseId=pageParams.id;
  const course=db.courses.find(c=>c.id===courseId);
  const exam=db.exams.find(e=>e.course_id===courseId);

  const enrollment=db.enrollments.find(e=>e.student_id===currentUser.id&&e.course_id===courseId);
  if(!enrollment||enrollment.progress_percentage<100){showToast('Complete all lessons first','error');navigate('student-learning',{id:courseId});return ''}
  const existingResult=db.exam_results.find(r=>r.student_id===currentUser.id&&r.exam_id===exam.id);
  if(existingResult){
    return`
    <section class="py-20 max-w-lg mx-auto px-4 text-center">
      <div class="bg-white rounded-2xl shadow-xl p-10">
        <div class="w-24 h-24 ${existingResult.result_status==='passed'?'bg-accent/10':'bg-red-50'} rounded-full flex items-center justify-center mx-auto mb-6">
          <i class="fas ${existingResult.result_status==='passed'?'fa-check-circle text-accent':'fa-times-circle text-red-500'} text-5xl"></i>
        </div>
        <h2 class="font-poppins font-bold text-2xl ${existingResult.result_status==='passed'?'text-accent':'text-red-500'} mb-2">${existingResult.result_status==='passed'?'Congratulations!':'Try Again'}</h2>
        <p class="text-gray-500 mb-4">Your score: <span class="font-bold text-primary text-xl">${existingResult.score}%</span></p>
        <p class="text-gray-400 text-sm mb-6">${existingResult.result_status==='passed'?'You have earned your certificate!':'You need '+exam.passing_score+'% to pass.'}</p>
        ${existingResult.result_status==='passed'?`<button class="btn-gold" onclick="navigate('student-certificates')"><i class="fas fa-certificate"></i> View Certificate</button>`:''}
        <button class="btn-outline ml-3" onclick="navigate('student-dashboard')">Back to Dashboard</button>
      </div>
    </section>`;
  }
  const questions=db.questions.filter(q=>q.exam_id===exam.id).sort((a,b)=>a.id-b.id);
  if(examState.submitted){
    const score=calculateExamScore(questions);
    const passed=score>=exam.passing_score;
    return`
    <section class="py-20 max-w-lg mx-auto px-4 text-center">
      <div class="bg-white rounded-2xl shadow-xl p-10">
        <div class="w-24 h-24 ${passed?'bg-accent/10':'bg-red-50'} rounded-full flex items-center justify-center mx-auto mb-6">
          <i class="fas ${passed?'fa-check-circle text-accent':'fa-times-circle text-red-500'} text-5xl"></i>
        </div>
        <h2 class="font-poppins font-bold text-2xl ${passed?'text-accent':'text-red-500'} mb-2">${passed?'Congratulations!':'Keep Trying!'}</h2>
        <p class="text-gray-500 mb-4">Your score: <span class="font-bold text-primary text-xl">${score}%</span></p>
        <p class="text-gray-400 text-sm mb-6">${passed?'You passed! Your certificate has been generated.':'You need '+exam.passing_score+'% to pass. Review the lessons and try again.'}</p>
        <button class="btn-primary" onclick="navigate('student-dashboard')">Back to Dashboard</button>
      </div>
    </section>`;
  }
  if(examState.timer){clearInterval(examState.timer)}
  examState={answers:examState.answers||{},submitted:false,timer:null,timeLeft:exam.duration*60};
  return`
  <section class="bg-primary text-white py-4">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button class="bg-white/10 p-2 rounded-lg" onclick="navigate('student-learning',{id:${courseId}})"><i class="fas fa-arrow-left"></i></button>
        <div><h2 class="font-poppins font-bold text-sm">${exam.title}</h2><div class="text-xs text-gray-300">${questions.length} Questions &bull; ${exam.passing_score}% to pass</div></div>
      </div>
      <div class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-lg"><i class="fas fa-clock text-gold"></i><span id="exam-timer" class="font-mono font-bold">${formatTime(examState.timeLeft)}</span></div>
    </div>
  </section>
  <section class="py-8 max-w-4xl mx-auto px-4 sm:px-6">
    <div class="space-y-6">
      ${questions.map((q,i)=>{
        const selected=examState.answers[q.id]||null;
        return`
        <div class="bg-white rounded-xl shadow-md p-6">
          <div class="flex items-start gap-3 mb-4">
            <span class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0">${i+1}</span>
            <h3 class="font-semibold text-primary pt-1">${q.question_text}</h3>
          </div>
          <div class="space-y-3 ml-11">
            ${q.options.map((opt,oi)=>{
              const letter=String.fromCharCode(65+oi);
              return`
              <div class="exam-option ${selected===letter?'selected':''}" onclick="selectAnswer(${q.id},'${letter}')">
                <span class="w-8 h-8 rounded-full border-2 ${selected===letter?'border-primary bg-primary text-white':'border-gray-300 text-gray-500'} flex items-center justify-center text-sm font-bold flex-shrink-0">${letter}</span>
                <span class="text-sm">${opt.text}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="mt-8 text-center">
      <button class="btn-gold text-base" onclick="submitExam(${exam.id},${courseId})"><i class="fas fa-paper-plane"></i> Submit Exam</button>
    </div>
  </section>`;
}
function selectAnswer(questionId,letter){examState.answers[questionId]=letter;render();startExamTimer()}
function startExamTimer(){
  if(examState.timer)return;
  examState.timer=setInterval(()=>{
    examState.timeLeft--;
    const el=document.getElementById('exam-timer');
    if(el)el.textContent=formatTime(examState.timeLeft);
    if(examState.timeLeft<=0){clearInterval(examState.timer);showToast('Time is up!','error');examState.submitted=true;render()}
  },1000);
}
function formatTime(s){return Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0')}
function calculateExamScore(questions){
  let correct=0;
  questions.forEach(q=>{if(examState.answers[q.id]===q.options.find(o=>o.is_correct)?String.fromCharCode(65+q.options.findIndex(o=>o.is_correct)):null)correct++});
  return Math.round((correct/questions.length)*100);
}
function submitExam(examId,courseId){
  if(Object.keys(examState.answers).length===0){showToast('Please answer at least one question','error');return}
  if(examState.timer)clearInterval(examState.timer);
  const db=getDB();
  const questions=db.questions.filter(q=>q.exam_id===examId);
  const score=calculateExamScore(questions);
  const passed=score>=db.exams.find(e=>e.id===examId).passing_score;
  db.exam_results.push({id:db.exam_results.length+1,student_id:currentUser.id,exam_id:examId,score:score,result_status:passed?'passed':'failed',exam_date:new Date().toISOString().split('T')[0]});
  if(passed){
    const certNum='ADS-'+new Date().getFullYear()+'-'+String(db.certificates.length+1).padStart(5,'0');
    db.certificates.push({id:db.certificates.length+1,student_id:currentUser.id,course_id:courseId,certificate_number:certNum,qr_code:'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data='+certNum,issue_date:new Date().toISOString().split('T')[0],status:'active'});
    db.notifications.push({id:db.notifications.length+1,user_id:currentUser.id,title:'Certificate Earned!',message:'Congratulations! You earned a certificate for completing the course.',read_status:false,created_at:new Date().toISOString().split('T')[0]});
  }
  saveDB(db);examState.submitted=true;render();
}

function renderAdminDashboard(students,courses,certs,revenue){

  });
  return`
  <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    ${[
      {icon:'fa-users',label:'Total Students',value:students,color:'bg-primary',chart:'students-chart'},
      {icon:'fa-book-open',label:'Total Courses',value:courses,color:'bg-gold-dark',chart:'courses-chart'},
      {icon:'fa-certificate',label:'Certificates',value:certs,color:'bg-accent',chart:'certs-chart'},

  </div>
  <div class="grid lg:grid-cols-2 gap-6 mb-8">
    <div class="bg-white rounded-xl shadow-md p-6">
      <h3 class="font-poppins font-bold text-lg text-primary mb-4">Enrollments by Course</h3>
      <div class="space-y-3">

      <h3 class="font-poppins font-bold text-lg text-primary mb-4">Recent Enrollments</h3>

              <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center"><i class="fas fa-user text-primary text-xs"></i></div>

function initAdminCharts(){
  ['students-chart','courses-chart','certs-chart','revenue-chart'].forEach(id=>{

    const vals=Array.from({length:7},()=>Math.random()*80+20);

    el.innerHTML=`<div class="flex items-end gap-1 h-full">${vals.map(v=>`<div class="flex-1 bg-white/30 rounded-sm" style="height:${(v/100)*maxH}px"></div>`).join('')}</div>`;

function filterAdminUsers(q){
  q=q.toLowerCase();
  document.querySelectorAll('.user-row').forEach(r=>{
    r.style.display=(r.dataset.name.includes(q)||r.dataset.role.includes(q))?'':'none';
  });
}
function toggleUserStatus(userId){
  const db=getDB();
  const user=db.users.find(u=>u.id===userId);
  if(user){user.status=!user.status;saveDB(db);showToast(`User ${user.status?'activated':'suspended'}`);render()}
}

}
function clearStudentProgress(){
  const db=getDB();
  db.lesson_progress=[];
  db.exam_results=db.exam_results.filter(r=>r.student_id!==1);
  db.enrollments.forEach(e=>{if(e.student_id===1){e.progress_percentage=0;e.status='in_progress'}});
  db.certificates=db.certificates.filter(c=>c.student_id!==1);
  saveDB(db);showToast('Student progress cleared');render();
}

// ==================== SCROLL ANIMATIONS ====================
function initScrollAnimations(){
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('opacity-100','translate-y-0');entry.target.classList.remove('opacity-0','translate-y-6')}});
  },{threshold:0.1});
  document.querySelectorAll('[data-animate]').forEach(el=>observer.observe(el));
}

// ==================== INIT ====================
initAuth();
render();
</script>
